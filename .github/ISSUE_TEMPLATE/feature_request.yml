name: Feature request
description: Propose a new capability or product improvement.
title: "[Feature]: "
labels: ["type:enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - core
        - console
        - site
        - playground
        - docs
        - packs
        - unsure
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or contributor problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Boundaries
      description: Note anything this should not change.
